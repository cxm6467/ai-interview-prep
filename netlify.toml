[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]
  included_files = ["netlify/functions/**/*.js"]

[[redirects]]
  from = "/api/ai-handler"
  to = "/.netlify/functions/ai-handler"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
