[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]
  
  # Configure the consolidated AI handler
  [functions.consolidated-ai-handler]
    node_bundler = "esbuild"
    external_node_modules = ["openai"]
    timeout = 120  # seconds - increased for comprehensive analysis

  # Keep the old handler for backward compatibility
  [functions.ai-handler]
    node_bundler = "esbuild"
    external_node_modules = ["openai"]
    timeout = 120  # seconds

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200