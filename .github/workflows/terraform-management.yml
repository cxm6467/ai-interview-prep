name: Terraform Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy
        - validate
        - fmt-check
      environment:
        description: 'Environment to target'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production
      auto_approve:
        description: 'Auto-approve apply/destroy (use with caution)'
        required: false
        default: false
        type: boolean

  # Also trigger on pushes to main for validation
  push:
    branches: [ main ]
    paths: [ 'iac/**' ]
  
  # And on PRs for planning
  pull_request:
    branches: [ main ]
    paths: [ 'iac/**' ]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.8.0

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'validate' }}
    runs-on: ubuntu-latest
    
    # Set environment based on input or default to development
    environment: ${{ github.event.inputs.environment || 'development' }}
    
    defaults:
      run:
        working-directory: iac
        
    permissions:
      id-token: write
      contents: read
      pull-requests: write # For posting plan comments
    
    outputs:
      plan_status: ${{ steps.plan.outputs.exitcode }}
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        role-session-name: GitHubActions-Terraform-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Terraform Format Check
      if: github.event.inputs.action == 'fmt-check' || github.event_name == 'pull_request'
      id: fmt
      run: |
        terraform fmt -check -recursive
        echo "result=$?" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Terraform Init
      id: init
      run: terraform init

    - name: Terraform Validate
      if: github.event.inputs.action == 'validate' || github.event_name == 'pull_request' || github.event_name == 'push'
      id: validate
      run: terraform validate -no-color

    - name: Terraform Plan
      if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' || github.event_name == 'pull_request'
      id: plan
      run: |
        terraform plan \
          -var="environment=${{ github.event.inputs.environment || 'development' }}" \
          -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
          -var="import_existing_resources=true" \
          -out=tfplan \
          -no-color
      continue-on-error: true

    - name: Post Plan Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          // 1. Retrieve existing bot comments for the PR
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          })
          const botComment = comments.find(comment => {
            return comment.user.type === 'Bot' && comment.body.includes('Terraform Plan')
          })
          
          // 2. Prepare format of the comment
          const output = `#### Terraform Plan 📖
          
          <details><summary>Show Plan</summary>
          
          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`
          
          </details>
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;
          
          // 3. If we have a comment, update it, otherwise create a new one
          if (botComment) {
            github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: output
            })
          } else {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
          }

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply' && (github.event.inputs.auto_approve == 'true' || github.ref == 'refs/heads/main')
      id: apply
      run: |
        terraform apply tfplan
        
    - name: Terraform Destroy Plan
      if: github.event.inputs.action == 'destroy'
      id: destroy_plan
      run: |
        terraform plan \
          -destroy \
          -var="environment=${{ github.event.inputs.environment || 'development' }}" \
          -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
          -var="import_existing_resources=true" \
          -out=destroy_plan \
          -no-color

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy' && (github.event.inputs.auto_approve == 'true' || github.ref == 'refs/heads/main')
      id: destroy
      run: |
        terraform apply destroy_plan

    - name: Upload Terraform Plan
      if: steps.plan.outputs.exitcode == 0
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ github.event.inputs.environment || 'development' }}-${{ github.run_id }}
        path: iac/tfplan
        retention-days: 30

    - name: Terraform Outputs
      if: github.event.inputs.action == 'apply' && steps.apply.outcome == 'success'
      run: terraform output -json

    - name: Summary
      if: always()
      run: |
        echo "## Terraform ${{ github.event.inputs.action || 'validate' }} Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.event.inputs.environment || 'development' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Action**: ${{ github.event.inputs.action || 'validate' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ steps.plan.outcome }}" == "success" ]]; then
          echo "- **Plan**: ✅ Successful" >> $GITHUB_STEP_SUMMARY
        elif [[ "${{ steps.plan.outcome }}" == "failure" ]]; then
          echo "- **Plan**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ steps.apply.outcome }}" == "success" ]]; then
          echo "- **Apply**: ✅ Successful" >> $GITHUB_STEP_SUMMARY
        elif [[ "${{ steps.apply.outcome }}" == "failure" ]]; then
          echo "- **Apply**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi