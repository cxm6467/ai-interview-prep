name: Deploy Full Stack

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - development
        - production
      skip_backend:
        description: 'Skip backend deployment'
        required: false
        default: false
        type: boolean
      skip_frontend:
        description: 'Skip frontend deployment'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  TF_VERSION: '1.6.0'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      api-gateway-url: ${{ steps.backend-deploy.outputs.api-url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=ai-interview-prep-frontend
          npm ci --workspace=ai-interview-prep-backend
          
      - name: Lint frontend
        run: npm run lint --workspace=ai-interview-prep-frontend
        
      - name: Build frontend (pre-backend)
        run: npm run build --workspace=ai-interview-prep-frontend
        env:
          CI: true

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event.inputs.skip_backend != 'true'
    outputs:
      api-url: ${{ steps.api-url.outputs.api-url }}
      
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push Docker image
        run: |
          cd iac
          
          # Get AWS account ID for ECR
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
          
          # Build and tag the image
          docker build -f Dockerfile ../apps/backend -t consolidated-ai-handler:latest
          docker tag consolidated-ai-handler:latest ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
          # Push to ECR
          docker push ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
      - name: Deploy backend infrastructure
        working-directory: iac
        run: |
          terraform init
          terraform validate
          terraform apply -auto-approve -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}"
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          
      - name: Get API Gateway URL
        working-directory: iac
        id: api-url
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api-url=${API_URL}" >> $GITHUB_OUTPUT
          echo "🚀 Backend deployed at: ${API_URL}"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-backend]
    if: always() && (needs.build-and-test.result == 'success') && (github.event.inputs.skip_frontend != 'true')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=ai-interview-prep-frontend
          
      - name: Update API Gateway URL in frontend
        if: needs.deploy-backend.outputs.api-url
        run: |
          API_URL="${{ needs.deploy-backend.outputs.api-url }}"
          echo "Updating frontend with API URL: ${API_URL}"
          
          # Update the aiAnalysis.ts file with the actual API Gateway URL
          sed -i "s|YOUR_API_GATEWAY_URL|${API_URL}|g" apps/frontend/src/services/aiAnalysis.ts
          
      - name: Build frontend with API URL
        run: npm run build --workspace=ai-interview-prep-frontend
        env:
          CI: true
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          
      - name: Deploy to S3 and CloudFront
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          
          if [ "$ENVIRONMENT" = "production" ]; then
            aws s3 sync apps/frontend/dist/ s3://${{ vars.S3_PRODUCTION_BUCKET }}/ --delete
            aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_PRODUCTION_ID }} --paths "/*"
            echo "🚀 Frontend deployed to production: https://${{ vars.PRODUCTION_DOMAIN }}"
          else
            aws s3 sync apps/frontend/dist/ s3://${{ vars.S3_DEVELOPMENT_BUCKET }}/ --delete
            aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DEVELOPMENT_ID }} --paths "/*"
            echo "🚀 Frontend deployed to development: https://${{ vars.DEVELOPMENT_DOMAIN }}"
          fi

  deployment-summary:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary"
          echo ""
          
          if [ "${{ needs.deploy-backend.result }}" = "success" ]; then
            echo "✅ **Backend**: Deployed successfully"
            echo "   - API Gateway URL: ${{ needs.deploy-backend.outputs.api-url }}"
          elif [ "${{ github.event.inputs.skip_backend }}" = "true" ]; then
            echo "⏭️ **Backend**: Skipped"
          else
            echo "❌ **Backend**: Failed to deploy"
          fi
          
          if [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "✅ **Frontend**: Deployed successfully"
            ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
            if [ "$ENVIRONMENT" = "production" ]; then
              echo "   - URL: https://${{ vars.PRODUCTION_DOMAIN }}"
            else
              echo "   - URL: https://${{ vars.DEVELOPMENT_DOMAIN }}"
            fi
          elif [ "${{ github.event.inputs.skip_frontend }}" = "true" ]; then
            echo "⏭️ **Frontend**: Skipped"
          else
            echo "❌ **Frontend**: Failed to deploy"
          fi