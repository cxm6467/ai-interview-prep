name: Deploy Frontend

on:
  push:
    branches: [main, develop]
    paths: 
      - 'apps/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'apps/frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspace=ai-interview-prep-frontend
          
      - name: Lint frontend
        run: npm run lint --workspace=ai-interview-prep-frontend
        
      - name: Build frontend
        run: npm run build --workspace=ai-interview-prep-frontend
        env:
          CI: true
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          
      - name: Deploy to S3 (Staging)
        if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
        run: |
          aws s3 sync apps/frontend/dist/ s3://${{ vars.S3_STAGING_BUCKET }}/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_STAGING_ID }} --paths "/*"
          
      - name: Deploy to S3 (Production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        run: |
          aws s3 sync apps/frontend/dist/ s3://${{ vars.S3_PRODUCTION_BUCKET }}/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_PRODUCTION_ID }} --paths "/*"
          
      - name: Comment deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ github.ref }}' === 'refs/heads/main' ? 'production' : 'staging';
            const url = environment === 'production' ? 
              'https://${{ vars.PRODUCTION_DOMAIN }}' : 
              'https://${{ vars.STAGING_DOMAIN }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Frontend deployed to **${environment}**!\n\nPreview: ${url}`
            });