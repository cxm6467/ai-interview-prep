name: Terraform Plan (Dry Run)

on:
  pull_request:
    branches: [main, develop]
    paths: 
      - 'apps/backend/**'
      - 'iac/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan for'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      plan_type:
        description: 'Type of plan to run'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy
      detailed_output:
        description: 'Show detailed plan output'
        required: false
        default: true
        type: boolean

env:
  TF_VERSION: '1.6.0'
  TF_IN_AUTOMATION: 'true'
  TF_CLI_ARGS: '-no-color'

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-TerraformPlan-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Terraform Format Check
        working-directory: iac
        run: |
          echo "🔍 Checking Terraform formatting..."
          terraform fmt -check -diff
        continue-on-error: true
        id: fmt
        
      - name: Terraform Init
        working-directory: iac
        run: |
          echo "🚀 Initializing Terraform..."
          terraform init
          
      - name: Terraform Validate
        working-directory: iac
        run: |
          echo "✅ Validating Terraform configuration..."
          terraform validate
          
      - name: Terraform Plan (Apply)
        if: github.event.inputs.plan_type != 'destroy'
        working-directory: iac
        id: plan
        run: |
          echo "📋 Generating Terraform plan..."
          
          # Set plan options based on input
          PLAN_OPTS=""
          if [ "${{ github.event.inputs.detailed_output }}" = "true" ]; then
            PLAN_OPTS="-detailed-exitcode"
          fi
          
          # Run the plan and capture exit code
          set +e
          terraform plan $PLAN_OPTS \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -out=tfplan
          PLAN_EXIT_CODE=$?
          set -e
          
          # Capture exit code for detailed analysis
          echo plan-exitcode=$PLAN_EXIT_CODE >> $GITHUB_OUTPUT
          
      - name: Terraform Plan (Destroy)
        if: github.event.inputs.plan_type == 'destroy'
        working-directory: iac
        id: plan-destroy
        run: |
          echo "💥 Generating Terraform destruction plan..."
          
          terraform plan -destroy \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -out=tfplan-destroy
          
      - name: Parse Plan Output
        working-directory: iac
        id: plan-summary
        run: |
          echo "📊 Analyzing plan output..."
          
          # Determine which plan file to use
          PLAN_FILE="tfplan"
          if [ "${{ github.event.inputs.plan_type }}" = "destroy" ]; then
            PLAN_FILE="tfplan-destroy"
          fi
          
          # Generate human-readable summary
          terraform show -no-color $PLAN_FILE > plan-output.txt
          
          # Extract summary statistics
          ADDITIONS=$(grep -c "will be created" plan-output.txt || echo "0")
          CHANGES=$(grep -c "will be updated" plan-output.txt || echo "0")
          DESTROYS=$(grep -c "will be destroyed" plan-output.txt || echo "0")
          
          # Generate summary
          cat << EOF > plan-summary.md
          ## 📋 Terraform Plan Summary
          
          **Plan Type:** ${{ github.event.inputs.plan_type || 'apply' }}
          **Environment:** ${{ github.event.inputs.environment || 'staging' }}
          **Trigger:** ${{ github.event_name }}
          
          ### Changes Overview
          - 🟢 **Resources to add:** ${ADDITIONS}
          - 🟡 **Resources to change:** ${CHANGES}  
          - 🔴 **Resources to destroy:** ${DESTROYS}
          
          ### Plan Status
          EOF
          
          # Add status based on exit code
          if [ "${{ steps.plan.outputs.plan-exitcode }}" = "0" ]; then
            echo "✅ **No changes** - Infrastructure is up to date" >> plan-summary.md
          elif [ "${{ steps.plan.outputs.plan-exitcode }}" = "2" ] || [ "${{ github.event.inputs.plan_type }}" = "destroy" ]; then
            echo "📝 **Changes detected** - Plan ready for review" >> plan-summary.md
          else
            echo "❌ **Plan failed** - Check errors below" >> plan-summary.md
          fi
          
          # Store outputs
          echo additions=$ADDITIONS >> $GITHUB_OUTPUT
          echo changes=$CHANGES >> $GITHUB_OUTPUT
          echo destroys=$DESTROYS >> $GITHUB_OUTPUT
          
      - name: Generate Security Analysis
        working-directory: iac
        id: security
        run: |
          echo "🔒 Running security analysis..."
          
          # Check for common security issues
          cat << EOF > security-analysis.md
          ### 🔒 Security Analysis
          
          EOF
          
          # Check if sensitive values are properly handled
          if grep -q "sensitive.*=.*true" *.tf; then
            echo "✅ Sensitive values are properly marked" >> security-analysis.md
          else
            echo "⚠️ Review: Ensure sensitive values are marked appropriately" >> security-analysis.md
          fi
          
          # Check for hardcoded values (more specific patterns)
          HARDCODED_ISSUES=0
          if grep -E "(password|secret|api_key|access_key|private_key).*=.*\"[^$]" *.tf | grep -v "route_key\|encryption_key"; then
            HARDCODED_ISSUES=1
            echo "🚨 **Warning:** Potential hardcoded secrets detected" >> security-analysis.md
          fi
          
          if [ $HARDCODED_ISSUES -eq 0 ]; then
            echo "✅ No hardcoded secrets detected" >> security-analysis.md
          fi
          
          echo hardcoded-issues=$HARDCODED_ISSUES >> $GITHUB_OUTPUT
          
      - name: Cost Estimation
        working-directory: iac
        id: cost
        run: |
          echo "💰 Estimating costs..."
          
          # Simple cost estimation based on resources
          cat << EOF > cost-estimation.md
          ### 💰 Estimated Monthly Costs
          
          > **Note:** These are rough estimates. Actual costs depend on usage patterns.
          
          | Resource | Estimated Cost |
          |----------|----------------|
          | Lambda Function | \$0-5 (depends on invocations) |
          | API Gateway | \$0-10 (depends on requests) |
          | ECR Repository | \$0-1 (storage) |
          | CloudWatch Logs | \$0-2 (log retention) |
          
          **Total Estimated Range:** \$0-18/month
          
          💡 **Cost Optimization Tips:**
          - Lambda costs are based on execution time and memory
          - API Gateway charges per request
          - Consider setting up CloudWatch cost alerts
          
          EOF
          
      - name: Comment on PR (Plan Results)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read all the generated markdown files
            const planSummary = fs.readFileSync('iac/plan-summary.md', 'utf8');
            const securityAnalysis = fs.readFileSync('iac/security-analysis.md', 'utf8');
            const costEstimation = fs.readFileSync('iac/cost-estimation.md', 'utf8');
            
            // Read the full plan output (truncated for comment size limits)
            const planOutput = fs.readFileSync('iac/plan-output.txt', 'utf8');
            const truncatedPlan = planOutput.length > 50000 
              ? planOutput.substring(0, 50000) + '\n\n... (truncated, see full output in workflow logs)'
              : planOutput;
            
            const comment = `
            ${planSummary}
            
            ${securityAnalysis}
            
            ${costEstimation}
            
            <details>
            <summary>📋 Full Terraform Plan</summary>
            
            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`
            
            </details>
            
            ---
            
            **Workflow:** [${context.workflow}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            **Commit:** ${context.sha.substring(0, 7)}
            `;
            
            // Find existing plan comment and update, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.body.includes('## 📋 Terraform Plan Summary')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            
      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_number }}
          path: |
            iac/tfplan*
            iac/plan-output.txt
            iac/plan-summary.md
            iac/security-analysis.md
            iac/cost-estimation.md
          retention-days: 30
          
      - name: Plan Summary
        run: |
          echo "## 🎯 Terraform Plan Complete"
          echo ""
          cat iac/plan-summary.md
          echo ""
          cat iac/security-analysis.md
          echo ""
          cat iac/cost-estimation.md
          echo ""
          echo "📁 Plan artifacts uploaded for 30 days"
          echo "🔍 Full plan details available in workflow logs"
          
          # Set job status based on results
          if [ "${{ steps.plan.outputs.plan-exitcode }}" = "1" ]; then
            echo "❌ Plan failed - see errors above"
            exit 1
          elif [ "${{ steps.security.outputs.hardcoded-issues }}" = "1" ]; then
            echo "⚠️ Security issues detected - please review"
            exit 1
          else
            echo "✅ Plan completed successfully"
          fi