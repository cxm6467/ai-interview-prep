name: Continuous Integration

on:
  push:
    branches: ['feature/*', 'fix/*', 'hotfix/*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  TF_VERSION: '1.6.0'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          npm install --workspace=ai-interview-prep-frontend
          npm install --workspace=ai-interview-prep-backend
          
      - name: Lint frontend
        run: npm run lint --workspace=ai-interview-prep-frontend
        
      - name: Build frontend
        run: npm run build --workspace=ai-interview-prep-frontend
        env:
          CI: true
          
      - name: Build backend
        run: |
          echo "Backend build check - verifying files exist"
          ls -la apps/backend/
          echo "✅ Backend files verified"

  validate-terraform:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Terraform Format Check
        working-directory: iac
        run: terraform fmt -check
        
      - name: Terraform Init
        working-directory: iac
        run: terraform init -backend=false
        
      - name: Terraform Validate
        working-directory: iac
        run: |
          # Create terraform.tfvars with dummy values for validation
          echo 'openai_api_key = "dummy-key-for-validation"' > terraform.tfvars
          terraform validate
          rm terraform.tfvars

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  check-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for vulnerabilities
        run: npm audit --audit-level high
        
      - name: Check for outdated packages
        run: npm outdated || true

  docker-build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image (test)
        run: |
          docker build -f iac/Dockerfile -t consolidated-ai-handler:test .
          
      - name: Test Docker image
        run: |
          # Basic smoke test - verify image was built and has correct files
          docker run --rm --entrypoint="" consolidated-ai-handler:test ls -la /var/task/
          docker run --rm --entrypoint="" consolidated-ai-handler:test node --version
          echo "✅ Docker image built successfully and contains required files"

  summary:
    runs-on: ubuntu-latest
    needs: [lint-and-build, validate-terraform, security-scan, check-dependencies, docker-build-test]
    if: always()
    
    steps:
      - name: CI Summary
        run: |
          echo "## 🔍 CI Results Summary"
          echo ""
          
          if [ "${{ needs.lint-and-build.result }}" = "success" ]; then
            echo "✅ **Lint & Build**: Passed"
          else
            echo "❌ **Lint & Build**: Failed"
          fi
          
          if [ "${{ needs.validate-terraform.result }}" = "success" ]; then
            echo "✅ **Terraform Validation**: Passed"
          else
            echo "❌ **Terraform Validation**: Failed"
          fi
          
          if [ "${{ needs.security-scan.result }}" = "success" ]; then
            echo "✅ **Security Scan**: Passed"
          else
            echo "⚠️ **Security Scan**: Issues found (check Security tab)"
          fi
          
          if [ "${{ needs.check-dependencies.result }}" = "success" ]; then
            echo "✅ **Dependency Check**: Passed"
          else
            echo "⚠️ **Dependency Check**: Issues found"
          fi
          
          if [ "${{ needs.docker-build-test.result }}" = "success" ]; then
            echo "✅ **Docker Build**: Passed"
          else
            echo "❌ **Docker Build**: Failed"
          fi
          
          echo ""
          if [ "${{ needs.lint-and-build.result }}" = "success" ] && [ "${{ needs.validate-terraform.result }}" = "success" ] && [ "${{ needs.docker-build-test.result }}" = "success" ]; then
            echo "🎉 **Overall**: All critical checks passed! Ready for deployment."
          else
            echo "🚨 **Overall**: Some critical checks failed. Please review before deployment."
          fi