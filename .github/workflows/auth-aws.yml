# Reusable workflow for AWS authentication
# Supports both OIDC (recommended) and traditional access keys

name: AWS Authentication

on:
  workflow_call:
    inputs:
      aws-region:
        description: 'AWS Region'
        type: string
        default: 'us-east-1'
      environment:
        description: 'Deployment environment'
        type: string
        default: 'development'
    secrets:
      # OIDC Method (recommended)
      AWS_ROLE_ARN:
        required: false
        description: 'AWS IAM Role ARN for OIDC'
      
      # Traditional Method (fallback)
      AWS_ACCESS_KEY_ID:
        required: false
        description: 'AWS Access Key ID'
      AWS_SECRET_ACCESS_KEY:
        required: false
        description: 'AWS Secret Access Key'

jobs:
  authenticate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ inputs.aws-region }}
          
      - name: Configure AWS credentials (Access Keys)
        if: ${{ secrets.AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}
          
      - name: Verify AWS authentication
        run: |
          echo "🔐 Verifying AWS authentication..."
          aws sts get-caller-identity
          
          echo ""
          echo "✅ Authentication successful!"
          echo "📊 Current AWS identity:"
          aws sts get-caller-identity --output table