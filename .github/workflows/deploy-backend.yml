name: Deploy Backend

on:
  push:
    branches: [main, develop]
    paths: 
      - 'apps/backend/**'
      - 'iac/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'apps/backend/**'
      - 'iac/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
        - development 
        - production
      terraform_action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
        - plan
        - apply
        - destroy
      dry_run:
        description: 'Dry run only (plan without applying)'
        required: false
        default: false
        type: boolean

env:
  TF_VERSION: '1.6.0'

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    outputs:
      plan-output: ${{ steps.plan.outputs.stdout }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          aws-region: us-east-1
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        run: |
          cd iac
          
          # Get AWS account ID for ECR
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
          
          # Build and tag the image
          docker build -f Dockerfile ../apps/backend -t consolidated-ai-handler:latest
          docker tag consolidated-ai-handler:latest ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
          # Push to ECR
          docker push ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
      - name: Terraform Init
        working-directory: iac
        run: terraform init
        
      - name: Terraform Validate
        working-directory: iac
        run: terraform validate
        
      - name: Terraform Plan
        id: plan
        working-directory: iac
        run: |
          terraform plan -no-color
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          TF_VAR_app_name: ${{ vars.APP_NAME || 'ai-interview-prep' }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || 'chrismarasco.io' }}
          TF_VAR_subdomain: ${{ vars.SUBDOMAIN || 'ai-ip' }}
          TF_VAR_create_route53_records: ${{ vars.CREATE_ROUTE53_RECORDS || 'true' }}
          
      - name: Comment Terraform plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '\n...(truncated)' : plan;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan 🏗️
            
            \`\`\`
            ${truncatedPlan}
            \`\`\`
            
            *Plan generated for commit ${{ github.sha }}*`
            });

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          aws-region: us-east-1
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
          
      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push Docker image
        run: |
          cd iac
          
          # Get AWS account ID for ECR
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com
          
          # Build and tag the image
          docker build -f Dockerfile ../apps/backend -t consolidated-ai-handler:latest
          docker tag consolidated-ai-handler:latest ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
          # Push to ECR
          docker push ${ECR_REGISTRY}/consolidated-ai-handler:latest
          
      - name: Terraform Init
        working-directory: iac
        run: terraform init
        
      - name: Terraform Apply
        if: github.event.inputs.terraform_action != 'destroy' && github.event.inputs.dry_run != 'true' && github.event.inputs.terraform_action != 'plan'
        working-directory: iac
        run: |
          terraform apply -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          TF_VAR_app_name: ${{ vars.APP_NAME || 'ai-interview-prep' }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || 'chrismarasco.io' }}
          TF_VAR_subdomain: ${{ vars.SUBDOMAIN || 'ai-ip' }}
          TF_VAR_create_route53_records: ${{ vars.CREATE_ROUTE53_RECORDS || 'true' }}
          
      - name: Terraform Plan Only (Dry Run)
        if: github.event.inputs.dry_run == 'true' || github.event.inputs.terraform_action == 'plan'
        working-directory: iac
        run: |
          echo "🔍 Running Terraform plan (dry run mode)"
          terraform plan -detailed-exitcode
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          TF_VAR_app_name: ${{ vars.APP_NAME || 'ai-interview-prep' }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || 'chrismarasco.io' }}
          TF_VAR_subdomain: ${{ vars.SUBDOMAIN || 'ai-ip' }}
          TF_VAR_create_route53_records: ${{ vars.CREATE_ROUTE53_RECORDS || 'true' }}
          
      - name: Terraform Destroy
        if: github.event.inputs.terraform_action == 'destroy'
        working-directory: iac
        run: |
          terraform destroy -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          TF_VAR_app_name: ${{ vars.APP_NAME || 'ai-interview-prep' }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || 'chrismarasco.io' }}
          TF_VAR_subdomain: ${{ vars.SUBDOMAIN || 'ai-ip' }}
          TF_VAR_create_route53_records: ${{ vars.CREATE_ROUTE53_RECORDS || 'true' }}
          
      - name: Get API Gateway URL
        if: github.event.inputs.terraform_action != 'destroy'
        working-directory: iac
        id: api-url
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api-url=${API_URL}" >> $GITHUB_OUTPUT
          echo "🚀 Backend deployed at: ${API_URL}"
          
      - name: Update frontend with API URL
        if: github.event.inputs.terraform_action != 'destroy'
        run: |
          # This could trigger a frontend deployment with the new API URL
          echo "API Gateway URL: ${{ steps.api-url.outputs.api-url }}"
          # TODO: Implement automatic frontend update with new API URL